<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depositar</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">  
</head>  

<body class="d-flex flex-column min-vh-100 bg-light">
  
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

      <div class="container">

        <a class="navbar-brand" href="index.html"><strong>Alke-Wallet</strong></a>

        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="menu.html">Volver al Menú</a>
          </li>
        </ul>

      </div>

    </nav>
  </header>
  
  <main class="container py-5 d-flex align-items-center justify-content-center">
    <section class="card shadow p-4 w-100" style="max-width: 450px;">
        
      <h2 class="text-center mb-4"><strong>Depositar Fondos</strong></h2>
      <div id="alertPlaceholder"></div>
        
      <form id="depositForm">

        <div class="form-group">
          <label for="monto">Monto a depositar:</label>
          <input type="number" id="monto" class="form-control form-control-lg" placeholder="$0" min="1000" required>
          <small class="form-text text-muted mt-2">El monto mínimo de depósito es $1000.</small>
        </div>
        
        <button type="submit" class="btn btn-success btn-lg btn-block mb-3">Realizar depósito</button>
        <a href="menu.html" class="btn btn-link btn-block text-center">Cancelar operación</a>

      </form>

    </section>
  </main>

  <footer class="text-center mt-auto bg-dark text-white py-3">
    <p class="mb-0">&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="script.js"></script>  
  
  <script>
    $(document).ready(function() {
      $('#depositForm').on('submit', function(event) {
        event.preventDefault(); 
        let montoIngresado = $('#monto').val();
        
        if (montoIngresado >= 1000) {
          $('#alertPlaceholder').html(`
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              <strong>¡Éxito!</strong> Has depositado $${montoIngresado} correctamente.
              <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
          `);

          setTimeout(() => {
            window.location.href = 'menu.html';
          }, 2000);
          
        } else {
          $('#alertPlaceholder').html(`
            <div class="alert alert-danger" role="alert">
              Por favor, ingrese un monto válido (mínimo $1000).
            </div>
          `);
        }
      });
    });
  </script>  
  
</body>
</html>
