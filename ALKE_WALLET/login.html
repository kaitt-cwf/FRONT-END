<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Inicio de Sesión</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html"><strong>Alke Wallet</strong></a>
    </nav>

    <main class="container my-auto">
      
        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow-sm">

                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Iniciar Sesión</h2>
                        
                        <form id="formLogin">
                            
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Ingrese admin@gmail.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="Ingrese 0000" required>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary btn-block btn-lg">Iniciar sesión</button>
                            </div>
                            
                        </form>
                         
                        <div class="text-center mt-3">
                            <small><a href="#">¿Olvidaste tu contraseña?</a></small>
                        </div>
                        
                    </div>

                </div>

            </div>

        </div>
        
    </main>

  <footer class="text-center mt-auto bg-dark text-white">
    <p class="mt-3">&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
  </footer>  

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#formLogin').on('submit', function(e) {
                e.preventDefault(); 
        
                let emailIngresado = $('#email').val();
                let passwordIngresada = $('#password').val();
        
                let emailCorrecto = "admin@gmail.com";
                let passCorrecta = "0000";
                
                if (emailIngresado === emailCorrecto && passwordIngresada === passCorrecta) {
                    
                    window.location.href = 'menu.html';
                    
                } else {
                    
                    alert("Acceso denegado. Las credenciales no coinciden con nuestros registros.");
                    
                }
            });
        });
    </script>
    
</body>
</html>
