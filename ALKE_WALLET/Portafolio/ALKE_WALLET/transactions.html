<!DOCTYPE html>
<html lang="es">
  
<head>
  <meta charset="UTF-8">
  <title>Alke Wallet - Historial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      
      <div class="container">
        <a class="navbar-brand"><strong>Alke-Wallet</strong></a>
        <ul class="navbar-nav ml-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Volver al Menú</a></li>
        </ul>
      </div>
      
    </nav>
  </header>

  <main class="container py-5">
    <section class="card shadow-sm p-4">
      <h2 class="text-center mb-4"><strong>Últimos Movimientos</strong></h2>
            
      <div class="mb-3">
        <input type="text" id="filtroTransacciones" class="form-control" placeholder="Buscar por fecha, concepto o monto">
      </div>

      <div class="table-responsive">
        <table class="table table-striped">
                  
          <thead class="table-dark">
            <tr>
              <th>Fecha</th><th>Concepto</th><th>Monto</th>
            </tr>
          </thead>
                    
          <tbody id="tablaCuerpo">
            <tr>
              <td>12/03/2026</td><td>Depósito</td><td class="text-success">+$50.000</td>
            </tr>
            <tr>
              <td>11/03/2026</td><td>Pago de Servicio</td><td class="text-danger">-$10.250</td>
            </tr>
            <tr>
              <td>10/03/2026</td><td>Transferencia de Juan Pérez</td><td class="text-success">+$25.000</td>
            </tr>
            <tr>
              <td>09/03/2026</td><td>Compra Supermercado</td><td class="text-danger">-$43.590</td>
            </tr>
          </tbody>
                    
        </table>
      </div>
            
    </section>
  </main>

  <footer class="text-center mt-auto bg-dark text-white">
    <p class="mt-3">&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function() {
      $("#filtroTransacciones").on("keyup", function() {
        let valor = $(this).val().toLowerCase();
        $("#tablaCuerpo tr").filter(function() {
          $(this).toggle($(this).text().toLowerCase().indexOf(valor) > -1)
        });
      });
    });
  </script>

</body>
</html>
